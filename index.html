<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPOR Systems | Automation & Infrastructure</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              light: '#60a5fa',
              DEFAULT: '#2563eb',
              dark: '#1e40af',
              accent: '#3b82f6'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .custom-scrollbar::-webkit-scrollbar {
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #1f2937;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 4px;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased selection:bg-brand-light selection:text-white overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Reusable Scroll Reveal Component ---
    const ScrollReveal = ({ children, delay = 0, className = "", direction = "up", threshold = 0.2 }) => {
      const [isVisible, setIsVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: threshold, rootMargin: "0px 0px -50px 0px" });

        if (domRef.current) observer.observe(domRef.current);
        return () => {
          if (domRef.current) observer.disconnect();
        };
      }, [threshold]);

      let baseTransform = "";
      switch (direction) {
        case "up": baseTransform = "translate-y-16"; break;
        case "down": baseTransform = "-translate-y-16"; break;
        case "left": baseTransform = "-translate-x-16"; break;
        case "right": baseTransform = "translate-x-16"; break;
        default: baseTransform = "translate-y-16";
      }

      return (
        <div
          ref={domRef}
          className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-x-0 translate-y-0 scale-100' : `opacity-0 ${baseTransform} scale-95`} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    };

    // --- Streamlined, High-Impact Core Areas ---
    const coreCapabilities = [
      {
        title: "Financial Intelligence",
        subtitle: "Automated Data Extraction",
        description: "Transform static balance sheets and income statements into automated, real-time KPI streams without manual data entry.",
        image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=1000&q=80"
      },
      {
        title: "Knowledge Graphs",
        subtitle: "SOP & Document Networking",
        description: "Turn deeply buried procedures and scattered PDFs into instantly searchable, fully interconnected enterprise networks.",
        image: "https://images.unsplash.com/photo-1504384764586-bb4cdc1707b0?auto=format&fit=crop&w=1000&q=80"
      },
      {
        title: "Contract Analysis",
        subtitle: "Risk & Compliance Parsing",
        description: "Instantly parse thousands of complex legal agreements to extract critical clauses, missing terms, and upcoming renewal dates.",
        image: "https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&w=1000&q=80"
      },
      {
        title: "Engineering Blueprints",
        subtitle: "Plan & CAD Structuring",
        description: "Automatically extract precise measurements, required materials, and quantities directly from dense architectural plans.",
        image: "https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=1000&q=80"
      },
      {
        title: "Workflow Routing",
        subtitle: "Email & Ticket Automation",
        description: "Analyze inbound communications, detect core intent, generate actionable tickets, and route them to the precise department instantly.",
        image: "https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1000&q=80"
      }
    ];

    const App = () => {
      const [scrolled, setScrolled] = useState(false);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        const handleMouseMove = (e) => {
          setMousePos({ x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight });
        };

        window.addEventListener('scroll', handleScroll);
        window.addEventListener('mousemove', handleMouseMove);

        return () => {
          window.removeEventListener('scroll', handleScroll);
          window.removeEventListener('mousemove', handleMouseMove);
        };
      }, []);

      return (
        <div className="min-h-screen flex flex-col font-sans bg-white">

          {/* Navigation */}
          <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/90 backdrop-blur-md shadow-sm border-b border-slate-200 py-3' : 'bg-transparent py-5'}`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center">
                <div className="flex items-center gap-3 cursor-pointer" onClick={() => window.scrollTo(0, 0)}>
                  <div className="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg transition-transform duration-300 hover:scale-105">
                    S
                  </div>
                  <span className={`font-extrabold text-2xl tracking-tight transition-colors ${scrolled ? 'text-slate-900' : 'text-white'}`}>SPOR Systems</span>
                </div>
                <div className="hidden md:flex items-center space-x-8">
                  <a href="#mission" className={`text-sm font-semibold transition-colors hover:text-brand ${scrolled ? 'text-slate-600' : 'text-slate-200'}`}>Mission</a>
                  <a href="#capabilities" className={`text-sm font-semibold transition-colors hover:text-brand ${scrolled ? 'text-slate-600' : 'text-slate-200'}`}>Capabilities</a>
                  <a href="#contact" className="bg-brand hover:bg-brand-light text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition-all shadow-lg hover:shadow-brand/40 hover:-translate-y-0.5">
                    Partner With Us
                  </a>
                </div>
              </div>
            </div>
          </nav>

          {/* Hero Section */}
          <header id="mission" className="relative bg-slate-900 overflow-hidden min-h-screen flex items-center pt-20">
            <div className="absolute inset-0 bg-gradient-to-br from-slate-900 via-[#0f172a] to-black opacity-95 z-0"></div>

            {/* Ambient Background Movement */}
            <div
              className="absolute top-0 -left-1/4 w-1/2 h-1/2 bg-brand-dark rounded-full mix-blend-screen filter blur-[150px] opacity-40 transition-transform duration-1000 ease-out z-0"
              style={{ transform: `translate(${mousePos.x * 60}px, ${mousePos.y * 60}px)` }}
            ></div>

            <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center z-10 w-full">
              <ScrollReveal delay={0} direction="down">
                <span className="inline-block py-1.5 px-4 rounded-full bg-slate-800 text-brand-light text-xs font-bold tracking-widest uppercase mb-8 border border-slate-700">
                  Infrastructure & Microservices
                </span>
              </ScrollReveal>

              <ScrollReveal delay={200}>
                <h1 className="text-6xl md:text-8xl font-black text-white tracking-tighter mb-6 leading-none">
                  Automate The <br className="hidden md:block" />
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">Unstructured.</span>
                </h1>
              </ScrollReveal>

              <ScrollReveal delay={400}>
                <p className="text-xl md:text-2xl text-slate-400 max-w-3xl mx-auto mb-12 font-light leading-relaxed">
                  We empower modern enterprises to eliminate manual data entry. SPOR Systems transforms scattered documents into clean, actionable infrastructure.
                </p>
              </ScrollReveal>

              <ScrollReveal delay={600} direction="up">
                <div className="flex flex-col sm:flex-row gap-6 justify-center">
                  <a href="#capabilities" className="bg-white text-slate-900 hover:bg-slate-200 font-bold py-4 px-10 rounded-full text-lg transition-all hover:scale-105">
                    See Capabilities
                  </a>
                </div>
              </ScrollReveal>
            </div>

            {/* Scroll Indicator */}
            <div className="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce z-10">
              <svg className="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </div>
          </header>

          {/* Dynamic Scroll Capabilities Section */}
          <main id="capabilities" className="py-24 bg-white relative z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

              {/* Intro to Capabilities */}
              <ScrollReveal delay={0} className="mb-32 text-center md:text-left md:max-w-3xl">
                <h2 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-6">Built for scale. <br /><span className="text-slate-400">Designed for action.</span></h2>
                <p className="text-xl text-slate-600">We don't build generic tools. We engineer deeply integrated microservices tailored to your specific operational bottlenecks.</p>
              </ScrollReveal>

              {/* The Dynamic Rows */}
              <div className="space-y-32 md:space-y-48">
                {coreCapabilities.map((cap, idx) => {
                  const isEven = idx % 2 === 0;

                  return (
                    <div key={idx} className={`flex flex-col ${isEven ? 'md:flex-row' : 'md:flex-row-reverse'} items-center gap-12 lg:gap-24`}>

                      {/* Image Reveal */}
                      <ScrollReveal
                        direction={isEven ? "left" : "right"}
                        delay={0}
                        threshold={0.3}
                        className="w-full md:w-1/2"
                      >
                        <div className="relative rounded-3xl overflow-hidden shadow-2xl group">
                          <div className="absolute inset-0 bg-brand/20 group-hover:bg-transparent transition-colors duration-500 z-10"></div>
                          <img
                            src={cap.image}
                            alt={cap.title}
                            className="w-full h-[400px] object-cover transition-transform duration-700 group-hover:scale-105"
                          />
                        </div>
                      </ScrollReveal>

                      {/* Text Reveal */}
                      <ScrollReveal
                        direction="up"
                        delay={200}
                        threshold={0.4}
                        className="w-full md:w-1/2 flex flex-col justify-center"
                      >
                        <span className="text-brand font-bold tracking-widest uppercase text-sm mb-4 block">
                          {cap.subtitle}
                        </span>
                        <h3 className="text-4xl lg:text-5xl font-black text-slate-900 mb-6 leading-tight tracking-tight">
                          {cap.title}
                        </h3>
                        <p className="text-lg lg:text-xl text-slate-600 leading-relaxed">
                          {cap.description}
                        </p>
                      </ScrollReveal>

                    </div>
                  );
                })}
              </div>

            </div>
          </main>

          {/* Footer / CTA Section */}
          <footer id="contact" className="bg-slate-900 border-t border-slate-800 mt-24 pt-24 pb-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

              <ScrollReveal direction="up" className="bg-slate-800 rounded-3xl p-10 md:p-16 text-center shadow-2xl mb-20 border border-slate-700 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-500"></div>
                <h2 className="text-4xl md:text-5xl font-black text-white mb-6">Stop manual entry. <br className="hidden md:block" /> Start building.</h2>
                <p className="text-xl text-slate-400 mb-10 max-w-2xl mx-auto">
                  Contact our engineering team to map out how SPOR Systems can integrate directly into your current architecture.
                </p>
                <div className="flex flex-col sm:flex-row justify-center items-center gap-6">
                  <a href="mailto:partnerships@sporsystems.ca" className="bg-brand hover:bg-brand-light text-white font-bold py-4 px-10 rounded-full transition-all text-lg hover:shadow-lg hover:shadow-brand/30">
                    partnerships@sporsystems.ca
                  </a>
                </div>
              </ScrollReveal>

              <div className="flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-slate-500">
                <div className="flex items-center gap-2">
                  <div className="w-6 h-6 bg-slate-700 text-white rounded flex items-center justify-center font-bold text-xs">S</div>
                  <span className="font-semibold text-slate-400 tracking-wide uppercase">SPOR Systems</span>
                </div>
                <p>&copy; 2026 SPOR Systems. All rights reserved.</p>
                <div className="flex gap-6">
                  <a href="#" className="hover:text-slate-300 transition-colors">Privacy</a>
                  <a href="#" className="hover:text-slate-300 transition-colors">Terms</a>
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
